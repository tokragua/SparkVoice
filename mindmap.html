<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SparkVoice Mind Map</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #080c14;
            --surface: #0f1520;
            --surface2: #161d2e;
            --border: rgba(99, 102, 241, 0.25);
            --accent: #6366f1;
            --accent2: #818cf8;
            --text: #e2e8f0;
            --muted: #64748b;
            --node-bg: linear-gradient(135deg, #131c2e 0%, #0e1525 100%);
            --node-border: rgba(99, 102, 241, 0.35);
            --node-hover: rgba(99, 102, 241, 0.7);
            --edge: rgba(99, 102, 241, 0.3);
            --root-from: #312e81;
            --root-to: #1e1b4b;
        }

        html,
        body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            overflow: hidden;
            user-select: none;
        }

        /* ── Header bar ── */
        #header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 64px;
            background: rgba(8, 12, 20, 0.85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 0 24px;
            z-index: 100;
        }

        #header h1 {
            font-size: 18px;
            font-weight: 600;
            background: linear-gradient(90deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            white-space: nowrap;
            letter-spacing: -0.3px;
        }

        .sep {
            flex: 1;
        }

        .date-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .date-group label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
        }

        input[type="date"] {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: inherit;
            font-size: 13px;
            padding: 6px 10px;
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s;
            color-scheme: dark;
        }

        input[type="date"]:hover,
        input[type="date"]:focus {
            border-color: var(--accent);
        }

        .divider {
            color: var(--muted);
            font-size: 12px;
        }

        #btn-create {
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            padding: 7px 20px;
            transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
            box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.5);
            letter-spacing: 0.02em;
        }

        #btn-create:hover {
            background: var(--accent2);
            box-shadow: 0 0 18px rgba(99, 102, 241, 0.4);
        }

        #btn-create:active {
            transform: scale(0.96);
        }

        #btn-create.loading {
            opacity: 0.6;
            pointer-events: none;
        }

        #btn-fullscreen {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--muted);
            cursor: pointer;
            font-size: 16px;
            line-height: 1;
            padding: 6px 10px;
            transition: color 0.2s, border-color 0.2s;
        }

        #btn-fullscreen:hover {
            color: var(--text);
            border-color: var(--accent);
        }

        /* ── Canvas area ── */
        #canvas-wrap {
            position: fixed;
            top: 64px;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
            cursor: grab;
        }

        #canvas-wrap.grabbing {
            cursor: grabbing;
        }

        #canvas-wrap canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* ── Empty state ── */
        #empty-state {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            pointer-events: none;
            opacity: 1;
            transition: opacity 0.4s;
        }

        #empty-state.hidden {
            opacity: 0;
        }

        #empty-state .icon {
            font-size: 56px;
            opacity: 0.25;
        }

        #empty-state p {
            font-size: 15px;
            color: var(--muted);
            max-width: 300px;
            text-align: center;
            line-height: 1.6;
        }

        #empty-state strong {
            color: var(--text);
        }

        /* ── Tooltip ── */
        #tooltip {
            position: fixed;
            pointer-events: none;
            max-width: 340px;
            background: rgba(15, 21, 32, 0.96);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 12.5px;
            line-height: 1.55;
            color: var(--text);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            z-index: 200;
            opacity: 0;
            transition: opacity 0.15s;
            word-break: break-word;
        }

        #tooltip.visible {
            opacity: 1;
        }

        #tooltip .tt-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--accent2);
            margin-bottom: 5px;
        }

        /* ── Stats bar ── */
        #stats-bar {
            position: fixed;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 21, 32, 0.8);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 5px 18px;
            font-size: 11.5px;
            color: var(--muted);
            backdrop-filter: blur(12px);
            z-index: 100;
            transition: opacity 0.3s;
            opacity: 0;
            pointer-events: none;
        }

        #stats-bar.visible {
            opacity: 1;
        }

        #stats-bar span {
            color: var(--accent2);
            font-weight: 600;
        }

        /* ── Search box ── */
        #search-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }

        #search-wrap .search-icon {
            position: absolute;
            left: 9px;
            color: var(--muted);
            font-size: 13px;
            pointer-events: none;
            line-height: 1;
        }

        #search-input {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: inherit;
            font-size: 13px;
            padding: 6px 10px 6px 30px;
            outline: none;
            width: 200px;
            transition: border-color 0.2s, width 0.2s, box-shadow 0.2s;
        }

        #search-input::placeholder {
            color: var(--muted);
        }

        #search-input:focus {
            border-color: var(--accent);
            width: 260px;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.15);
        }

        #search-input.has-value {
            border-color: rgba(251, 191, 36, 0.6);
        }

        /* Subtle dot-grid background */
        #canvas-wrap::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle, rgba(99, 102, 241, 0.08) 1px, transparent 1px);
            background-size: 32px 32px;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div id="header">
        <h1>⚡ SparkVoice Mind Map</h1>
        <div id="search-wrap">
            <span class="search-icon">⌕</span>
            <input type="text" id="search-input" placeholder="Search nodes…" autocomplete="off" spellcheck="false" />
        </div>
        <div class="sep"></div>
        <div class="date-group">
            <label>From</label>
            <input type="date" id="date-from" />
        </div>
        <div class="divider">→</div>
        <div class="date-group">
            <label>To</label>
            <input type="date" id="date-to" />
        </div>
        <button id="btn-create">Create</button>
        <button id="btn-fullscreen" title="Toggle fullscreen">⛶</button>
    </div>

    <div id="canvas-wrap">
        <canvas id="map-canvas"></canvas>
        <div id="empty-state">
            <div class="icon">🗺️</div>
            <p>Select a <strong>date range</strong> above and click <strong>Create</strong> to generate a mind map from
                your transcription history.</p>
        </div>
    </div>

    <div id="tooltip">
        <div class="tt-label">Full text</div>
        <div id="tooltip-text"></div>
    </div>

    <div id="stats-bar"></div>

    <script type="module" src="/src/mindmap.ts"></script>
</body>

</html>
