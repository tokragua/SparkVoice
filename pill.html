<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SparkVoice Pill</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: transparent;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      width: 100vw;
    }

    .pill-container {
      width: 190px;
      height: 50px;
      background: rgba(15, 15, 15, 0.9);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 25px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 15px;
      /* Box shadow removed to avoid square window artifacts on some Windows versions */
      box-sizing: border-box;
      transition: all 0.3s ease;
      cursor: move;
      user-select: none;
    }

    .pill-container:hover {
      background: rgba(25, 25, 25, 0.95);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .pill-container.recording {
      border-color: rgba(0, 255, 136, 0.5);
      box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
    }

    .icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      cursor: pointer;
    }

    .waveform-container {
      flex-grow: 1;
      height: 30px;
      margin: 0 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #waveform {
      width: 100%;
      height: 100%;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: #444;
      transition: background-color 0.3s ease;
    }

    .recording .status-dot {
      background-color: #00ff88;
      box-shadow: 0 0 8px #00ff88;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }

      100% {
        opacity: 1;
      }
    }
  </style>
</head>

<body data-tauri-drag-region>
  <div class="pill-container" id="pill-container" data-tauri-drag-region>
    <div class="icon" id="mic-toggle">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z" />
        <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
        <line x1="12" x2="12" y1="19" y2="22" />
      </svg>
    </div>
    <div class="waveform-container" data-tauri-drag-region>
      <canvas id="waveform"></canvas>
    </div>
    <div class="status-dot"></div>
  </div>
  <script type="module" src="/src/pill.ts"></script>
</body>

</html>
