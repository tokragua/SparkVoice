<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SparkVoice Pill</title>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: transparent;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      width: 100vw;
    }

    .pill-container {
      width: 240px;
      height: 50px;
      background: rgba(15, 15, 15, 0.9);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 25px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 15px;
      /* Box shadow removed to avoid square window artifacts on some Windows versions */
      box-sizing: border-box;
      transition: all 0.3s ease;
      cursor: move;
      user-select: none;
    }

    .pill-container:hover {
      background: rgba(25, 25, 25, 0.95);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .pill-container.recording {
      border-color: rgba(0, 255, 136, 0.5);
      box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
    }

    .icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      cursor: pointer;
    }

    .waveform-container {
      flex-grow: 1;
      height: 30px;
      margin: 0 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #waveform {
      width: 100%;
      height: 100%;
    }

    .status-container {
      width: 12px;
      height: 12px;
      position: relative;
      cursor: default;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background-color: #444;
      border-radius: 50%;
      transition: all 0.3s ease;
    }

    .pill-container.recording .status-dot {
      background-color: #ff4444;
      box-shadow: 0 0 8px rgba(255, 68, 68, 0.5);
      animation: pulse 1.5s infinite;
    }

    .cancel-icon {
      position: absolute;
      font-size: 16px;
      color: #fff;
      display: none;
      cursor: pointer;
      user-select: none;
      transition: transform 0.2s ease, color 0.2s ease;
    }

    .cancel-icon:hover {
      color: #ff4444;
      transform: scale(1.2);
    }

    .pill-container.transcribing .status-dot {
      display: none;
    }

    .pill-container.transcribing .cancel-icon {
      display: block;
    }

    .pill-actions {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-left: 8px;
      border-left: 1px solid rgba(255, 255, 255, 0.1);
      padding-left: 8px;
      transition: all 0.3s ease;
    }

    .pill-container.compact {
      width: 125px;
      height: 30px;
      border-radius: 15px;
    }

    .pill-container.compact .waveform-container {
      height: 20px;
    }

    .pill-container.compact #mic-toggle,
    .pill-container.compact #copy-btn,
    .pill-container.compact #settings-btn,
    .pill-container.compact .pill-actions border-left {
      display: none;
    }

    /* Hide divider in compact mode */
    .pill-container.compact .pill-actions {
      border-left: none;
      margin-left: 0;
      padding-left: 0;
    }

    .action-btn {
      font-size: 18px !important;
      color: rgba(255, 255, 255, 0.5);
      cursor: pointer;
      user-select: none;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      border-radius: 50%;
    }

    .action-btn:hover {
      color: #fff;
      background: rgba(255, 255, 255, 0.1);
      transform: rotate(30deg);
    }

    #compact-toggle {
      font-size: 12px !important;
      opacity: 0.3;
      padding: 0;
      margin-left: 2px;
    }

    #compact-toggle:hover {
      opacity: 1;
      transform: none;
      /* Don't rotate the toggle */
    }

    @keyframes pulse {
      0% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }

      100% {
        opacity: 1;
      }
    }
  </style>
</head>

<body data-tauri-drag-region>
  <div class="pill-container" id="pill-container" data-tauri-drag-region>
    <div class="icon" id="mic-toggle">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z" />
        <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
        <line x1="12" x2="12" y1="19" y2="22" />
      </svg>
    </div>
    <div class="waveform-container" data-tauri-drag-region>
      <canvas id="waveform"></canvas>
    </div>
    <div class="status-container" id="status-container">
      <div class="status-dot"></div>
      <div class="cancel-icon material-symbols-outlined">close</div>
    </div>
    <div class="pill-actions">
      <div class="action-btn material-symbols-outlined" id="copy-btn" title="Copy Last Text">content_copy</div>
      <div class="action-btn material-symbols-outlined" id="settings-btn" title="Settings">settings</div>
      <div class="action-btn material-symbols-outlined" id="compact-toggle" title="Toggle Compact Mode">chevron_left
      </div>
    </div>
  </div>
  <script type="module" src="/src/pill.ts"></script>
</body>

</html>
